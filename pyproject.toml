[tool.poetry]
name = "aioway"
version = "0.1.0"
description = "AI on the way"
authors = ["RenChu Wang <patrick1031wang@gmail.com>"]
license = "X"
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.12"
faiss-cpu = "^1.9.0.post1"
ibis = "^3.3.0"
lark = "^1.2.2"
numpy = "^2.1.3"
pandas = "^2.2.3"
rich = "^13.9.4"
tensordict = "^0.6.2"
torch = "^2.5.1"
mypy = "^1.14.0"

[tool.poetry.group.dev.dependencies]
ansible = "^11.0.0"
build = "^1.2.2.post1"
autoflake = "^2.3.1"
black = "^24.10.0"
coverage = "^7.6.7"
Cython = "^3.0.11"
ipython = "^8.29.0"
isort = "^5.13.2"
jupyter = "^1.1.1"
jupyter-book = "^1.0.3"
mypy = "^1.13.0"
ninja = "^1.11.1.1"
pip = "^24.3.1"
pytest = "^8.3.3"
pytest-cov = "^6.0.0"
pytest-sugar = "^1.0.0"
pytest-xdist = "^3.6.1"
setuptools = "^75.6.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.autoflake]
in-place = true
recursive = true
exclude = "__init__.py"
expand-star-imports = true
remove-all-unused-imports = true
remove-duplicate-keys = true

[tool.black]
line-length = 88

[tool.isort]
profile = "black"

[tool.mypy]
show_error_codes = true
exclude = "tests"
check_untyped_defs = true

# Skipping analysis for some modules because they are not typed.
[[tool.mypy.overrides]]
module = [
    "faiss.*",
    "tensordict.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
addopts = [
    "-v",
    "--import-mode=importlib",
]
