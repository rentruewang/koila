[project]
name = "aioway"
version = "0.1.0"
description = "AI on the way"
authors = [
    {name = "RenChu Wang", email = "patrick1031wang@gmail.com"},
]
maintainers = [
    {name = "RenChu Wang", email = "patrick1031wang@gmail.com"},
]
dependencies = [
    "lark>=1.1.9",
    "numpy>=2.1.3",
    "pandas>=2.2.3",
    "rich>=13.9.4",
    "tensordict>=0.6.0",
    "torch>=2.2.2",
    "typer>=0.12.3",
]

requires-python = ">=3.11"
readme = "README.md"
license = {text = "X"}

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
aioway = "aioway.cli:app"

[tool.autoflake]
in-place = true
recursive = true
exclude = "__init__.py"
expand-star-imports = true
remove-all-unused-imports = true
remove-duplicate-keys = true

[tool.black]
line-length = 88

[tool.isort]
profile = "black"

[tool.mypy]
show_error_codes = true
exclude = "tests"

# Skipping analysis for some modules because they are not typed.
[[tool.mypy.overrides]]
module = [
    "tensordict.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
addopts = [
    "-v",
    "--failed-first",
    "--import-mode=importlib",
]

[dependency-groups]
format = [
    "autoflake>=2.3.1",
    "black>=24.10.0",
    "isort>=5.13.2",
]
type = [
    "mypy>=1.13.0",
    "pip>=24.3.1",
]
build = [
    "cython>=3.0.11",
    "ninja>=1.11.1.1",
    "nuitka>=2.4.11",
    "setuptools>=75.5.0",
]
website = [
    "jupyter>=1.1.1",
    "jupyter-book>=1.0.3",
    "myst-parser>=2.0.0",
    "sphinx-autobuild>=2024.10.3",
]
test = [
    "coverage>=7.6.1",
    "pytest>=8.1.1",
    "pytest-cov>=5.0.0",
    "pytest-sugar>=1.0.0",
    "pytest-xdist>=3.6.1",
]
debug = [
    "ansible>=10.6.0",
    "ipython>=8.29.0",
    "jupyter>=1.1.1",
]
